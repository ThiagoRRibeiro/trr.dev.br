<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        /* Define the color scheme variables for easy adjustment */
        :root {
            --red-bright: #FF0000; /* Primary Alert Color */
            --red-deep: #CC2929; /* Accent/Secondary Red */
            --maroon-light: #993D3D; /* Tertiary Color */
            --maroon-dark: #663D3D; /* Container/Secondary BG */
            --bg-darkest: #332929; /* Main Body Background */
            --text-color: #E0E0E0; /* Light text for contrast */
        }

        /* Base styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-darkest);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ensures it takes up the full viewport height */
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 40px;
            background-color: rgba(30, 25, 25, 0.8); /* Slightly lighter dark background */
            border: 4px solid var(--red-deep);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            animation: fadeIn 2s ease-out; /* Simple entry animation */
        }

        /* Heading Styling */
        h1 {
            font-size: 4em;
            color: var(--red-bright); /* Using the bright alert red */
            margin-bottom: 0.1em;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Sub-heading/Alert Bar */
        .alert-bar {
            background-color: var(--red-deep);
            color: white;
            padding: 10px 20px;
            margin-bottom: 30px;
            border-radius: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Body Text */
        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        /* Call to action/Detail Text */
        .details {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed var(--maroon-light);
            font-size: 0.9em;
            color: var(--maroon-light);
        }

        /* Keyframe animation for smooth loading effect */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Optional: Mobile Responsiveness */
        @media (max-width: 600px) {
            h1 {
                font-size: 3em;
            }

            .container {
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="alert-bar">
            SITE UNDER CONSTRUCTION
        </div>

        <p>
            Our website is currently undergoing a major redesign and optimization. We are working hard behind the scenes to bring you an even better experience.
        </p>

        <p>
            Please check back soon!
        </p>

    </div>

</body>
</html>
